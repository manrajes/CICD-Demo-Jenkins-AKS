
apiVersion: apps/v1
kind: Deployment
metadata:
  name: flask-aks-app
  labels:
    app: flask-aks-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: flask-aks-app
  template:
    metadata:
      labels:
        app: flask-aks-app
    spec:
      containers:
      - name: flask-aks-app
        image: ${AZURE_CONTAINER_REGISTRY}.azurecr.io/flask-aks-app:${BUILD_NUMBER}
        ports:
        - containerPort: 5000
---
apiVersion: v1
kind: Service
metadata:
  name: flask-aks-service
spec:
  type: LoadBalancer
  ports:
  - port: 80
    targetPort: 5000
  selector:
    app: flask-aks-app